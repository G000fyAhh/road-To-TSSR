<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road to TSSR</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .locked { opacity: 0.5; filter: grayscale(0.5); }
        .module-card { transition: all 0.2s ease; }
        .module-card:hover:not(.locked) { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }
        
        .prose h3 { font-size: 1.125rem; font-weight: 700; margin-bottom: 0.5rem; color: #1e293b; }
        .prose p, .prose ul { color: #475569; font-size: 0.875rem; line-height: 1.5; margin-bottom: 0.75rem; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; }
        .prose strong { color: #0f172a; }
        .prose code { background: #f1f5f9; padding: 2px 4px; border-radius: 4px; font-family: monospace; color: #2563eb; font-size: 0.8rem; }
        
        .opt-btn { transition: all 0.2s ease; }
        .opt-correct { background-color: #ecfdf5 !important; border-color: #10b981 !important; color: #047857 !important; }
        .opt-wrong { background-color: #fef2f2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .opt-disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen antialiased pb-16">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-4">
                    <!-- h-16 (64px) sur mobile, h-20 (80px) sur grand écran -->
                    <img src="logo.png" alt="Road to TSSR" class="h-16 md:h-20 w-auto object-contain">
                    
                    <div>
                        <h1 class="sr-only">Road to TSSR</h1>
                        <p class="text-sm text-slate-500 font-medium whitespace-nowrap">Plateforme d'entraînement</p>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <div class="bg-slate-50 px-4 py-2 rounded-lg border border-slate-200 text-sm text-center">
                        <span class="block text-slate-500 text-[10px] uppercase font-bold">Précision</span>
                        <span id="stats-display" class="font-semibold text-slate-700">0%</span>
                    </div>
                    <div class="bg-blue-50 px-4 py-2 rounded-lg border border-blue-100 text-center">
                        <span class="block text-blue-800 text-[10px] font-bold uppercase">Points</span>
                        <span id="score-display" class="text-xl font-bold text-blue-600 leading-none">0</span>
                    </div>
                </div>
            </div>
            <div>
                <div class="flex justify-between text-[10px] font-bold text-slate-500 mb-1 uppercase">
                    <span>Progression</span>
                    <span id="progress-text">0%</span>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-1.5">
                    <div id="progress-bar" class="bg-blue-600 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <div class="mb-8 flex justify-between items-end">
            <h2 class="text-xl font-bold text-slate-800">Catalogue des Modules</h2>
            <button onclick="requestReset()" class="text-xs text-red-500 hover:text-red-700 font-medium transition-colors">Réinitialiser la progression</button>
        </div>
        <div id="chapters-container" class="space-y-10"></div>
    </main>

   <!-- Modale Quiz -->
    <div id="quiz-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[60]">
        <div class="bg-white w-full max-w-2xl rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <h3 id="quiz-title" class="font-bold text-slate-800 truncate pr-4">Titre</h3>
                <div class="flex items-center gap-4 shrink-0">
                    <span class="text-xs font-bold text-blue-700 bg-blue-100 px-2 py-1 rounded-md">Points : <span id="modal-score-display">0</span></span>
                    <button onclick="closeQuizModal()" class="text-slate-400 hover:text-slate-600 transition-colors text-sm font-medium">Abandonner</button>
                </div>
            </div>
            <div id="quiz-content" class="p-6 overflow-y-auto"></div>
        </div>
    </div>

    <!-- Modale Reset -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center p-6 z-[70]">
        <div class="bg-white w-full max-w-sm rounded-xl shadow-2xl p-6 border border-slate-200 text-center">
            <h3 class="text-lg font-bold text-slate-900 mb-2">Tout effacer ?</h3>
            <p class="text-sm text-slate-500 mb-6">Action irréversible.</p>
            <div class="flex gap-3 justify-center">
                <button onclick="closeConfirmModal()" class="px-4 py-2 rounded-lg text-slate-600 bg-slate-100 hover:bg-slate-200 font-medium">Annuler</button>
                <button onclick="executeReset()" class="px-4 py-2 rounded-lg text-white bg-red-500 hover:bg-red-600 font-medium">Réinitialiser</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[80] flex flex-col gap-3"></div>

    <script>
        const defaultState = { points: 50, indiceCost: 10, unlocked: [], completions: {}, moduleScores: {}, stats: { correct: 0, wrong: 0 } };
        let state = JSON.parse(localStorage.getItem('tssr_v11')) || defaultState;


        const chapters = [
            { id: 'net', title: 'Infrastructures Réseaux' },
            { id: 'lin', title: 'Administration Linux' },
            { id: 'win', title: 'Écosystème Windows Server' },
            { id: 'virt', title: 'Virtualisation & Sécurité' },
            { id: 'diag', title: 'Support & Diagnostic IT' } // <-- NOUVEAU CHAPITRE
        ];

        const modules = [
            // Réseaux
            { id: 'osi', chapId: 'net', title: 'Modèle OSI & Encapsulation', price: 10 },
            { id: 'ipv4', chapId: 'net', title: 'Adressage IPv4 & Routage', price: 15 },
            { id: 'ipv6', chapId: 'net', title: 'IPv6 Avancé', price: 15 },
            { id: 'vlan', chapId: 'net', title: 'Switching & VLANs', price: 20 },
            { id: 'cisco', chapId: 'net', title: 'Administration Cisco', price: 25 },
            { id: 'dhcp-dns', chapId: 'net', title: 'DHCP & DNS', price: 20 },
            // Linux
            { id: 'lin-cmd', chapId: 'lin', title: 'CLI & Flux', price: 10 },
            { id: 'lin-perm', chapId: 'lin', title: 'Droits & Sécurité OS', price: 15 },
            { id: 'lin-net', chapId: 'lin', title: 'Config Réseau Linux', price: 20 },
            { id: 'lin-srv', chapId: 'lin', title: 'Systemd & Logs', price: 20 },
            { id: 'lin-apt', chapId: 'lin', title: 'Gestion de Paquets', price: 15 },
            { id: 'lin-lvm', chapId: 'lin', title: 'Stockage LVM & FS', price: 25 },
            { id: 'lin-bash', chapId: 'lin', title: 'Scripting Bash', price: 25 },
            // Windows
            { id: 'win-ad', chapId: 'win', title: 'Active Directory Avancé', price: 15 },
            { id: 'win-gpo', chapId: 'win', title: 'Stratégies de Groupe (GPO)', price: 20 },
            { id: 'win-wds', chapId: 'win', title: 'Déploiement WDS', price: 20 },
            { id: 'win-mdt', chapId: 'win', title: 'Automatisation MDT', price: 25 },
            { id: 'win-ps', chapId: 'win', title: 'Scripting PowerShell', price: 25 },
            { id: 'win-fs', chapId: 'win', title: 'Partages & Droits NTFS', price: 15 },
            // Virtualisation
            { id: 'virt-prox', chapId: 'virt', title: 'Proxmox & Hyperviseurs', price: 20 },
            { id: 'virt-cont', chapId: 'virt', title: 'Docker & Conteneurs', price: 20 },
            { id: 'sec-fw', chapId: 'virt', title: 'Filtrage & Pare-feu', price: 20 },
            { id: 'sec-vpn', chapId: 'virt', title: 'Cryptographie & VPN', price: 25 },
            // Diagnostic
            { id: 'diag-net', chapId: 'diag', title: 'Troubleshooting Réseau', price: 30 },
            { id: 'diag-os', chapId: 'diag', title: 'Troubleshooting OS', price: 30 },
            { id: 'diag-itil', chapId: 'diag', title: 'Méthodologie & ITIL', price: 20 }
        ];


        const quizDatabase = {
            // ==========================================
            // CHAPITRE : SUPPORT & DIAGNOSTIC
            // ==========================================
            'diag-net': {
                course: `<div class="prose"><h3>Méthodologie Réseau</h3><p>Toujours vérifier la couche 1 (physique) avant la couche 3 (routage).</p><ul><li><strong>Ping :</strong> Vérifie la connectivité IP (ICMP).</li><li><strong>Traceroute / Tracert :</strong> Identifie où le paquet se perd.</li><li><strong>Nslookup / Dig :</strong> Isole les problèmes de résolution de noms.</li><li><strong>Wireshark / tcpdump :</strong> Capture les trames pour voir ce qui transite réellement.</li></ul></div>`,
                questions: [
                    { q: "Un PC (192.168.1.10) ne va pas sur Internet. Il ping sa passerelle (192.168.1.254) et ping 8.8.8.8, mais 'ping google.fr' échoue. Le problème vient de :", options: ["La table de routage du routeur", "Le serveur DHCP qui n'a pas donné d'IP", "Le serveur DNS configuré sur le PC", "Un câble réseau défectueux"], correct: 2, hint: "Si l'IP publique répond, le routage est bon. C'est la résolution de nom qui bloque." },
                    { q: "Deux PC reliés au même switch ne parviennent pas à communiquer. Leurs IP sont 10.0.0.5/24 et 10.0.0.6/24. Quel est le test le plus pertinent ?", options: ["Faire un 'arp -a' pour voir si la MAC de l'autre est apprise", "Faire un traceroute", "Vérifier la passerelle par défaut", "Redémarrer le routeur"], correct: 0, hint: "Sur un même réseau local (LAN), la communication se fait en Couche 2 (MAC), sans passer par le routeur." },
                    { q: "Quel problème classique provoque une 'tempête de broadcast' faisant s'effondrer un réseau ?", options: ["Une attaque DDoS venant d'Internet", "Une boucle réseau physique (sans Spanning Tree)", "Un serveur DHCP en panne", "Un conflit d'adresse IP"], correct: 1, hint: "Quand un paquet tourne en rond à l'infini entre plusieurs switches." },
                    { q: "Lors d'un 'tracert', la 3ème ligne affiche des '* * * Délai d\'attente dépassé'. Que cela signifie-t-il ?", options: ["La destination finale est éteinte", "Le câble est coupé", "Le routeur de ce saut bloque le protocole ICMP", "Le serveur DNS est introuvable"], correct: 2, hint: "Certains routeurs refusent de répondre aux requêtes de test pour des raisons de sécurité." }
                ]
            },
            'diag-os': {
                course: `<div class="prose"><h3>Troubleshooting OS</h3><p>Sur Windows : <strong>Observateur d'événements (Event Viewer)</strong> (Système, Application, Sécurité). BSOD = Écran bleu (souvent matériel ou pilote).</p><p>Sur Linux : Logs dans <code>/var/log/</code> (syslog, auth.log). Commande <code>dmesg</code> pour les erreurs matérielles du noyau (Kernel).</p></div>`,
                questions: [
                    { q: "Un utilisateur se plaint qu'une application métier crash aléatoirement sous Windows. Que regardez-vous en premier ?", options: ["Le gestionnaire des tâches", "L'Observateur d'événements (Journaux Windows > Application)", "La base de registre", "L'invite de commande"], correct: 1, hint: "C'est là que Windows note tous les plantages et codes d'erreur." },
                    { q: "Un serveur Linux refuse de démarrer correctement et affiche 'Kernel Panic'. D'où cela peut-il provenir ?", options: ["Le serveur SSH est arrêté", "Le pare-feu bloque le démarrage", "Un problème de montage du disque principal (/etc/fstab) ou du noyau", "Un mot de passe root expiré"], correct: 2, hint: "Le noyau (Kernel) ne trouve pas ce dont il a besoin pour lancer l'OS de base." },
                    { q: "Sous Windows Server, un utilisateur verrouille son compte sans arrêt. Quel journal permet d'identifier la machine source du problème ?", options: ["Journal Système", "Journal de Sécurité (Audit des ouvertures de session)", "Journal d'Application", "Journal Setup"], correct: 1, hint: "Tout ce qui touche à l'authentification et aux droits s'y trouve." },
                    { q: "Sous Linux, quelle commande permet de voir en temps réel la consommation CPU/RAM des processus pour trouver celui qui fige le serveur ?", options: ["ls", "grep", "top ou htop", "df -h"], correct: 2, hint: "C'est l'équivalent du gestionnaire des tâches." }
                ]
            },
            'diag-itil': {
                course: `<div class="prose"><h3>Méthodologie & ITIL</h3><p>ITIL (Information Technology Infrastructure Library) est le standard des bonnes pratiques IT.</p><ul><li><strong>Incident :</strong> Interruption non planifiée d'un service.</li><li><strong>Problème :</strong> Cause racine d'un ou plusieurs incidents.</li><li><strong>SLA :</strong> Service Level Agreement (Garantie de temps de rétablissement/réponse).</li></ul></div>`,
                questions: [
                    { q: "Selon ITIL, quelle est la différence entre un Incident et un Problème ?", options: ["Un incident est grave, un problème est mineur", "L'incident est l'interruption, le problème est la cause sous-jacente", "Un problème est causé par un utilisateur, un incident par le matériel"], correct: 1, hint: "On résout l'incident rapidement (ex: redémarrer le service), puis on cherche le problème (ex: pourquoi le service a planté)." },
                    { q: "Un utilisateur signale que son PC ne s'allume pas du tout. En demandant des détails, il dit que l'écran affiche 'No Signal'. Quel est le vrai diagnostic ?", options: ["Le PC est mort", "Le câble vidéo ou l'écran a un souci, le PC tourne peut-être", "L'alimentation de l'immeuble est coupée"], correct: 1, hint: "Ne jamais se fier uniquement au premier diagnostic de l'utilisateur." },
                    { q: "Que signifie la notion de GTR dans un contrat SLA ?", options: ["Garantie de Temps de Rétablissement (Résolution maximum)", "Gestion Totale du Réseau", "Garantie de Temps de Réponse (Prise en compte maximum)"], correct: 0, hint: "Si la GTR est de 4h, le service doit refonctionner avant 4h." }
                ]
            },

            // ==========================================
            // CHAPITRE : RÉSEAUX
            // ==========================================
            'osi': {
                course: `<div class="prose"><h3>Le Modèle OSI</h3><p>7 couches. PDU (Protocol Data Unit) :</p><ul><li><strong>L4 Transport :</strong> Segment. Protocoles : TCP, UDP, Ports (Ex: 80, 443).</li><li><strong>L3 Réseau :</strong> Paquet. Protocole : IP, ICMP. Équipement : Routeur.</li><li><strong>L2 Liaison :</strong> Trame. Adressage MAC. Équipement : Switch.</li></ul></div>`,
                questions: [
                    { q: "Un switch de niveau 2 peut-il bloquer le trafic vers l'adresse IP 8.8.8.8 ?", options: ["Oui, grâce aux VLANs", "Non, un switch L2 ne lit pas les adresses IP (Couche 3)", "Oui, avec un pare-feu intégré"], correct: 1, hint: "Il s'arrête à l'adresse MAC." },
                    { q: "À quelle couche du modèle OSI se situe le processus d'encapsulation où l'on ajoute le port source et destination ?", options: ["Couche 2 (Liaison)", "Couche 3 (Réseau)", "Couche 4 (Transport)", "Couche 7 (Application)"], correct: 2, hint: "Les ports définissent le transport des données." },
                    { q: "Le protocole HTTPS fonctionne à la couche Application (7), mais il s'appuie sur un protocole de la couche Transport pour garantir l'arrivée des données. Lequel ?", options: ["UDP", "IP", "TCP", "MAC"], correct: 2, hint: "Il a besoin d'une connexion fiable avec accusé de réception." },
                    { q: "Quel est le PDU (Protocol Data Unit) de la couche 3 (Réseau) ?", options: ["La Trame", "Le Paquet", "Le Segment", "La Donnée"], correct: 1, hint: "Un routeur route des..." }
                ]
            },
            'ipv4': {
                course: `<div class="prose"><h3>Routage & Sous-réseaux (Subnetting)</h3><p>Un masque /24 = 255.255.255.0 = 254 hôtes utilisables.<br><strong>IP Réseau :</strong> Tous les bits hôtes à 0.<br><strong>IP Broadcast :</strong> Tous les bits hôtes à 1.</p></div>`,
                questions: [
                    { q: "Dans le sous-réseau 192.168.10.0/24, quelle est l'adresse de diffusion (Broadcast) ?", options: ["192.168.10.1", "192.168.10.254", "192.168.10.255"], correct: 2, hint: "C'est la dernière adresse possible du bloc." },
                    { q: "Un PC est configuré en DHCP mais n'arrive pas à joindre le serveur. Il obtient l'adresse 169.254.10.5. Qu'est-ce que cela signifie ?", options: ["C'est une adresse publique", "C'est une adresse APIPA (auto-assignée car DHCP injoignable)", "Le routeur est mal configuré"], correct: 1, hint: "Windows s'attribue cette adresse en dernier recours." },
                    { q: "Combien d'adresses utilisables pour les machines y a-t-il dans un sous-réseau /26 ?", options: ["254", "126", "62", "30"], correct: 2, hint: "2^(32-26) - 2 adresses réservées (Réseau et Broadcast)." },
                    { q: "Quelle technologie permet à plusieurs PC d'un réseau privé d'accéder à Internet en partageant une seule adresse IP publique ?", options: ["Le VLAN", "Le NAT / PAT", "Le Spanning Tree", "Le DHCP"], correct: 1, hint: "Network Address Translation." }
                ]
            },
            'ipv6': {
                course: `<div class="prose"><h3>IPv6 Avancé</h3><p>Fin de l'épuisement des adresses. Plus de NAT obligatoire, plus de Broadcast (remplacé par Multicast).</p><ul><li><strong>SLAAC :</strong> Auto-configuration sans serveur DHCPv6.</li><li><strong>Loopback :</strong> <code>::1</code> (équivalent 127.0.0.1).</li></ul></div>`,
                questions: [
                    { q: "En IPv6, comment une machine peut-elle configurer son IP toute seule sans serveur DHCP ?", options: ["Via le protocole SLAAC et les annonces du routeur (NDP)", "Elle utilise l'APIPA obligatoirement", "Elle invente une adresse aléatoire"], correct: 0, hint: "Stateless Address Autoconfiguration." },
                    { q: "L'adresse IPv6 '::1' correspond à quoi en IPv4 ?", options: ["192.168.1.1 (Passerelle)", "255.255.255.255 (Broadcast)", "127.0.0.1 (Loopback / Localhost)"], correct: 2, hint: "C'est la boucle locale." },
                    { q: "Vrai ou Faux : En IPv6, le Broadcast n'existe plus.", options: ["Vrai (remplacé par le Multicast/Anycast)", "Faux"], correct: 0, hint: "L'envoi massif à tous a été supprimé pour plus d'efficacité." },
                    { q: "Quelle est la taille de l'en-tête (Header) de base d'un paquet IPv6 comparé à l'IPv4 ?", options: ["Plus petit et variable", "Plus grand (40 octets) mais fixe et simplifié", "Identique"], correct: 1, hint: "Conçu pour être traité plus vite par les routeurs matériels." }
                ]
            },
            'vlan': {
                course: `<div class="prose"><h3>VLANs & Spanning Tree</h3><p><strong>802.1Q (Trunk) :</strong> Ajoute un tag de 4 octets à la trame Ethernet pour identifier le VLAN.<br><strong>VLAN Natif :</strong> Le seul VLAN qui circule sur un Trunk sans aucun tag.<br><strong>Spanning Tree (STP) :</strong> Désactive les ports redondants pour éviter les boucles L2.</p></div>`,
                questions: [
                    { q: "Que se passe-t-il si un switch reçoit une trame non-tagguée sur un port configuré en Trunk ?", options: ["Il la supprime", "Il l'envoie dans tous les VLANs", "Il l'assigne au VLAN Natif"], correct: 2, hint: "C'est le rôle de ce VLAN spécifique." },
                    { q: "Le protocole Spanning Tree (STP) bloque certains liens. Pourquoi ?", options: ["Pour économiser de l'énergie", "Pour éviter les boucles (loops) de diffusion en Couche 2", "Pour bloquer les pirates"], correct: 1, hint: "Les trames n'ont pas de 'Time To Live' (TTL), une boucle est donc fatale." },
                    { q: "Sur un switch, qu'est-ce qu'un port 'Access' ?", options: ["Un port qui appartient à un seul VLAN et retire le tag sortant", "Un port qui relie deux switchs entre eux", "Un port réservé à l'administrateur"], correct: 0, hint: "Le PC branché dessus ne sait même pas qu'il est dans un VLAN." },
                    { q: "Qu'est-ce que le routage Inter-VLAN (ou Router-on-a-Stick) ?", options: ["Relier les switchs en wifi", "Utiliser un routeur avec des sous-interfaces pour faire communiquer 2 VLANs distincts", "Désactiver les VLANs"], correct: 1, hint: "Les VLANs isolent par nature, il faut remonter en Couche 3 pour les faire se parler." }
                ]
            },
            'cisco': {
                course: `<div class="prose"><h3>Administration Cisco</h3><p><code>show ip interface brief</code> : Statut rapide des ports.<br><code>show running-config</code> : Config active (en RAM).<br><code>show startup-config</code> : Config sauvegardée (en NVRAM).<br>Mots de passe : <code>enable secret</code> est chiffré, <code>enable password</code> est en clair.</p></div>`,
                questions: [
                    { q: "Un routeur redémarre et perd toute votre configuration de la matinée. Que s'est-il passé ?", options: ["Le routeur est défectueux", "Vous avez oublié de faire un 'copy running-config startup-config'", "Le câble console était débranché"], correct: 1, hint: "La configuration n'était qu'en mémoire vive (RAM)." },
                    { q: "Quelle commande permet de désactiver (éteindre) administrativement l'interface Gigabit0/1 ?", options: ["stop interface", "shutdown", "disable"], correct: 1, hint: "Pour l'allumer, on utilise l'inverse : 'no ...'." },
                    { q: "Quel protocole Cisco (propriétaire) permet de découvrir les équipements réseau directement connectés ?", options: ["LLDP", "ARP", "CDP (Cisco Discovery Protocol)"], correct: 2, hint: "L'équivalent standard ouvert est LLDP." },
                    { q: "Comment sécuriser l'accès privilégié (enable) avec un mot de passe fortement chiffré (MD5/SHA) ?", options: ["enable password Mdp", "enable secret Mdp", "secure password Mdp"], correct: 1, hint: "Le terme 'secret' invoque le hachage par défaut." }
                ]
            },
            'dhcp-dns': {
                course: `<div class="prose"><h3>Services Réseaux</h3><p><strong>DHCP Relay (ip helper-address) :</strong> Permet à des requêtes DHCP (Broadcast) de traverser un routeur pour atteindre un serveur DHCP distant.<br><strong>DNS :</strong> Record 'A' (IPv4), 'AAAA' (IPv6), 'MX' (Serveur Mail), 'TXT' (Validation domaine/SPF).</p></div>`,
                questions: [
                    { q: "Un PC fait un DHCP Discover. Le serveur DHCP n'est pas dans le même sous-réseau. Que faut-il configurer sur le routeur ?", options: ["Un agent relais DHCP (ip helper-address)", "Rien, le broadcast traverse les routeurs", "Un NAT statique"], correct: 0, hint: "Le routeur transforme le broadcast DHCP en message Unicast ciblé vers le serveur." },
                    { q: "Que gère le paramètre 'Durée du bail' (Lease Time) d'un serveur DHCP ?", options: ["La durée de validité du mot de passe WiFi", "La durée pendant laquelle l'IP est prêtée au client avant qu'il doive la renouveler", "Le temps de réponse du serveur"], correct: 1, hint: "C'est un prêt, pas un don à vie." },

                questions: [
                    { q: "Pour que la Haute Disponibilité (HA) fonctionne et déplace une VM en cas de crash, quelle est la condition technique absolue ?", options: ["Avoir un lien fibre 10Gbps", "Que le disque virtuel de la VM soit sur un stockage partagé (SAN/NAS/Ceph) accessible par les deux nœuds", "Avoir Windows Server"], correct: 1, hint: "Si le disque dur est physiquement coincé dans le serveur planté, l'autre serveur ne peut pas la rallumer." },
                    { q: "Qu'est-ce que 'Ceph' dans l'écosystème Proxmox ?", options: ["L'interface web", "Un système de stockage distribué permettant de créer un SAN avec les disques locaux des serveurs", "Un pare-feu logiciel"], correct: 1, hint: "HCI (Hyper-Converged Infrastructure)." },
                    { q: "Dans un cluster Proxmox (et les clusters en général), qu'est-ce que la notion de 'Quorum' ?", options: ["La majorité des votes des nœuds en ligne nécessaire pour que le cluster prenne des décisions (éviter le Split-Brain)", "La quantité de RAM allouée", "Le réseau dédié aux migrations"], correct: 0, hint: "C'est pour ça qu'un cluster doit avoir un nombre impair de nœuds (3, 5, 7)." },
                    { q: "Quelle fonctionnalité permet de faire une sauvegarde d'une VM Proxmox allumée sans l'éteindre ?", options: ["Live Migration", "Snapshot (Instantané) via QEMU Agent", "Clonage"], correct: 1, hint: "Gèle l'état du disque le temps de la copie." }
                ]
            },
            'virt-cont': {
                course: `<div class="prose"><h3>Docker & Conteneurs</h3><p><strong>Image :</strong> Template en lecture seule (Recette).<br><strong>Conteneur :</strong> Instance de l'image en cours d'exécution.<br><strong>Volume :</strong> Persistance des données (Si on supprime le conteneur, le volume survit).<br><strong>Docker Compose :</strong> Fichier YAML pour lancer plusieurs conteneurs liés (Ex: Web + BDD).</p></div>`,
                questions: [
                    { q: "Si je supprime un conteneur Docker (docker rm), que deviennent les données écrites à l'intérieur (fichiers uploadés, base de données) ?", options: ["Elles sont archivées", "Elles sont définitivement perdues (sauf si un Volume Docker externe était monté)", "Elles restent dans l'image"], correct: 1, hint: "Un conteneur est éphémère par nature. On doit lier la donnée à l'hôte physique." },
                    { q: "Dans une commande Docker, que signifie le paramètre '-p 8080:80' ?", options: ["Redirige le port 80 de l'hôte (Linux) vers le port 8080 du conteneur", "Redirige le port 8080 de l'hôte vers le port 80 du conteneur", "Limite la taille à 8080Mo"], correct: 1, hint: "Format : HOST_PORT:CONTAINER_PORT." },
                    { q: "Quel fichier décrit la recette pour construire sa propre Image Docker (copier les fichiers, installer des dépendances) ?", options: ["docker-compose.yml", "Dockerfile", "Vagrantfile"], correct: 1, hint: "C'est le fichier source de fabrication." },
                    { q: "Sur quoi repose techniquement l'isolation d'un conteneur LXC ou Docker sous Linux ?", options: ["Un hyperviseur matériel", "Les Cgroups (Ressources) et les Namespaces (Isolement des processus)", "Un noyau virtuel"], correct: 1, hint: "Ce sont des fonctionnalités pures du noyau Linux." }
                ]
            },
            'sec-fw': {
                course: `<div class="prose"><h3>Pare-feu & Filtrage (Iptables/UFW/pfSense)</h3><p><strong>Règle par défaut (Policy) :</strong> 'DROP' tout ce qui entre, 'ACCEPT' ce qui sort.<br><strong>NAT / SNAT :</strong> Masquer les IP privées vers Internet.<br><strong>Port Forwarding (DNAT) :</strong> Autoriser Internet à joindre un serveur Web interne via un port spécifique.<br><strong>DMZ :</strong> Zone isolée du LAN pour les serveurs publics.</p></div>`,
                questions: [
                    { q: "Quelle est la bonne pratique absolue en matière de règles de pare-feu (Firewall) ?", options: ["Tout autoriser et bloquer ce qui est dangereux (Blacklisting)", "Tout bloquer (Implicit Deny) et n'autoriser que les flux strictement nécessaires (Whitelisting)", "Activer l'antivirus"], correct: 1, hint: "Principe du moindre privilège." },
                    { q: "Qu'est-ce qu'une DMZ (Zone Démilitarisée) ?", options: ["Un réseau WiFi invité", "Un sous-réseau isolé hébergeant les serveurs exposés à Internet, empêchant le piratage d'atteindre le réseau LAN interne", "Un pare-feu cloud"], correct: 1, hint: "Si le serveur Web est compromis, le pirate reste enfermé dans cette zone." },
                    { q: "Une règle de pare-feu 'Stateful' s'applique. Vous autorisez un serveur interne à interroger Internet sur le port 80. Faut-il créer une règle de retour ?", options: ["Oui, autoriser le port 80 en entrée", "Non, le pare-feu garde la connexion en mémoire et autorise dynamiquement le trafic de réponse", "Oui, autoriser tous les ports hauts"], correct: 1, hint: "Il gère l'état (State) de la session." },
                    { q: "Dans pfSense (ou Iptables), comment appelle-t-on la technique pour rediriger le trafic arrivant sur l'IP Publique:Port 443 vers l'IP Privée d'un serveur Web interne ?", options: ["Le filtrage MAC", "Le Port Forwarding (Destination NAT / DNAT)", "Le SNAT"], correct: 1, hint: "On transfère le port." }
                ]
            },
            'sec-vpn': {
                course: `<div class="prose"><h3>VPN & Cryptographie</h3><p><strong>Chiffrement Asymétrique :</strong> 1 Clé Publique (pour chiffrer) + 1 Clé Privée (pour déchiffrer) -> Certificats RSA.<br><strong>IPSec :</strong> Standard pour Site-à-Site. Fonctionne en 2 phases (IKE Phase 1: Négociation du tunnel sécurisé, IKE Phase 2: Chiffrement des données IP).<br><strong>Split-Tunneling :</strong> Seul le trafic vers l'entreprise passe dans le VPN, le reste passe par la box de la maison.</p></div>`,
                questions: [
                    { q: "Dans un VPN Client-à-Site avec 'Split-Tunneling' (Tunnel Divisé), que se passe-t-il quand le télétravailleur va sur YouTube ?", options: ["Le trafic passe par le VPN de l'entreprise", "Le trafic sort directement par sa box internet personnelle, sans saturer le VPN", "Youtube est bloqué"], correct: 1, hint: "Seul le trafic destiné au réseau de l'entreprise emprunte le tunnel." },
                    { q: "Quel est le principe de la Cryptographie Asymétrique (utilisée par RSA et SSL/TLS) ?", options: ["La même clé chiffre et déchiffre", "Une clé publique chiffre le message, seule la clé privée correspondante peut le déchiffrer", "Il n'y a pas de clé, juste un mot de passe"], correct: 1, hint: "C'est la base de la sécurité web (HTTPS)." },
                    { q: "Dans un VPN IPSec Site-à-Site, à quoi sert la phase 1 (IKE Phase 1) ?", options: ["À chiffrer le trafic utilisateur", "À authentifier les routeurs entre eux et négocier le canal sécurisé initial", "À attribuer une adresse IP au client"], correct: 1, hint: "Avant d'envoyer les données secrètes, les deux gardes du corps doivent se mettre d'accord." },
                    { q: "Lequel de ces protocoles VPN modernes, intégré au noyau Linux, est réputé pour sa vitesse extrême et sa simplicité de configuration ?", options: ["PPTP", "OpenVPN", "WireGuard", "IPSec"], correct: 2, hint: "C'est le plus récent et performant." }
                ]
            }
        };















        let currentModuleId = null;
        let currentQuizData = null;
        let currentQuestionIndex = 0;
        let scoreQuiz = { correct: 0, wrong: 0 };
        let rewardPotential = 0;
        let questionAnswered = false;

        function initApp() { updateDashboard(); renderChapters(); }

        function updateDashboard() {
            // Met à jour l'écran principal
            document.getElementById('score-display').innerText = state.points;
            
            // NOUVEAU : Met à jour les points dans la fenêtre du quiz en temps réel
            const modalScore = document.getElementById('modal-score-display');
            if (modalScore) modalScore.innerText = state.points;

            const total = state.stats.correct + state.stats.wrong;
            const accuracy = total === 0 ? 0 : Math.round((state.stats.correct / total) * 100);
            document.getElementById('stats-display').innerText = `${accuracy}%`;
            const compCount = Object.keys(state.completions).length;
            const progPct = Math.round((compCount / modules.length) * 100);
            document.getElementById('progress-bar').style.width = `${progPct}%`;
            document.getElementById('progress-text').innerText = `${progPct}%`;
        }

        function renderChapters() {
            const container = document.getElementById('chapters-container');
            container.innerHTML = chapters.map(chap => {
                const chapMods = modules.filter(m => m.chapId === chap.id);
                return `
                    <section>
                        <h3 class="text-lg font-bold text-slate-800 border-b border-slate-200 pb-2 mb-4">${chap.title}</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                            ${chapMods.map(m => renderModuleCard(m)).join('')}
                        </div>
                    </section>
                `;
            }).join('');
        }

        function renderModuleCard(m) {
            const isUnlocked = state.unlocked.includes(m.id);
            const timesComp = state.completions[m.id] || 0;
            const bestScore = state.moduleScores[m.id] !== undefined ? state.moduleScores[m.id] : 0;
            const hasData = quizDatabase[m.id]; 
            
            // 1. État Bloqué (Grisé)
            if (!isUnlocked) {
                const canAfford = state.points >= m.price;
                return `
                    <div class="border border-slate-300 rounded-xl p-4 bg-slate-200/60 flex flex-col justify-between h-32 locked module-card">
                        <h4 class="font-semibold text-slate-500 text-sm">${m.title}</h4>
                        <button onclick="unlockModule('${m.id}', ${m.price})" class="w-full py-1.5 rounded font-bold text-xs mt-2 shadow-sm ${canAfford ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-slate-300 text-slate-500 cursor-not-allowed'}" ${!canAfford ? 'disabled' : ''}>
                            Débloquer (-${m.price} pts)
                        </button>
                    </div>`;
            }

            // Styles dynamiques selon la réussite pour le fond de la carte
            let bgClass = 'bg-white border-slate-200 border-l-4 border-l-slate-300';
            let statusBadge = '<div class="h-4"></div>';

            if (timesComp > 0) {
                if (bestScore >= 70) {
                    bgClass = 'bg-emerald-50 border-emerald-200 border-l-4 border-l-emerald-500';
                    statusBadge = `<div class="flex justify-end"><span class="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 rounded-full font-bold">Excellent (${bestScore}%)</span></div>`;
                } else {
                    bgClass = 'bg-orange-50 border-orange-200 border-l-4 border-l-orange-500';
                    statusBadge = `<div class="flex justify-end"><span class="text-[9px] bg-orange-100 text-orange-700 px-1.5 rounded-full font-bold">À revoir (${bestScore}%)</span></div>`;
                }
            }

            const reward = timesComp === 0 ? 30 : 5; 
            return `
                <div class="border rounded-xl p-4 flex flex-col justify-between h-32 module-card ${bgClass}">
                    <div>
                        ${statusBadge}
                        <h4 class="font-bold text-slate-900 text-sm mt-1">${m.title}</h4>
                    </div>
                    <button onclick="startModule('${m.id}', '${m.title.replace(/'/g, "\\'")}', ${reward})" class="w-full py-1.5 rounded font-bold text-xs mt-2 shadow-sm ${hasData ? 'bg-blue-600 hover:bg-blue-700 text-white' : 'bg-slate-300 text-slate-500 cursor-not-allowed'}" ${!hasData ? 'disabled' : ''}>
                        ${hasData ? (timesComp > 0 ? `Refaire (+${reward} pts)` : `Lancer (+${reward} pts)`) : 'En construction'}
                    </button>
                </div>`;
        }

        function unlockModule(id, price) {
            if (state.points >= price) {
                state.points -= price;
                state.unlocked.push(id);
                saveAndRefresh();
                showToast(`Module débloqué ! (-${price} pts)`, 'success');
            }
        }

        function startModule(id, title, pts) {
            currentModuleId = id;
            currentQuizData = quizDatabase[id];
            currentQuestionIndex = 0;
            scoreQuiz = { correct: 0, wrong: 0 };
            rewardPotential = pts;

            document.getElementById('quiz-title').innerText = title;
            document.getElementById('quiz-modal').classList.remove('hidden');
            
            const content = document.getElementById('quiz-content');
            content.innerHTML = `
                <div class="mb-4"><span class="text-xs font-bold text-blue-500 uppercase">Flash-Cours</span></div>
                <div class="bg-blue-50/50 p-6 rounded-xl border border-blue-100">${currentQuizData.course}</div>
                <div class="mt-6 text-right">
                    <button onclick="renderQuestion()" class="bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5 px-6 rounded-lg">Passer aux questions →</button>
                </div>
            `;
        }

        function renderQuestion() {
            if (currentQuestionIndex >= currentQuizData.questions.length) return finishQuiz();
            questionAnswered = false;
            
            const q = currentQuizData.questions[currentQuestionIndex];
            let optionsHtml = q.options.map((opt, i) => `
                <button id="opt-${i}" onclick="handleAnswer(${i})" class="opt-btn w-full text-left p-4 rounded-lg border border-slate-200 hover:border-blue-500 hover:bg-blue-50 font-medium text-slate-700 mb-3">
                    ${opt}
                </button>
            `).join('');

            document.getElementById('quiz-content').innerHTML = `
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <span class="text-xs font-bold text-slate-400 uppercase">Question ${currentQuestionIndex + 1} / ${currentQuizData.questions.length}</span>
                        <h4 class="text-lg font-semibold text-slate-900 mt-2">${q.q}</h4>
                    </div>
                    <button onclick="buyHint()" id="hint-btn" class="text-xs bg-amber-100 text-amber-700 font-bold px-3 py-1.5 rounded hover:bg-amber-200">Indice(' + state.indiceCost + ')</button>
                </div>
                
                <div id="hint-box" class="hidden mb-4 p-3 bg-amber-50 border border-amber-200 text-amber-800 text-sm rounded-lg">
                    <strong>💡 Indice : </strong> <span>${q.hint}</span>
                </div>

                <div id="options-container">${optionsHtml}</div>
                
                <div id="next-container" class="hidden mt-6 text-right">
                    <button onclick="nextQuestion()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-lg">Question suivante →</button>
                </div>
            `;
        }

        function buyHint() {
            if(questionAnswered) return;
            if (state.points >= state.indiceCost) {
                state.points -= state.indiceCost;
                updateDashboard();
                saveOnly();
                document.getElementById('hint-btn').classList.add('hidden');
                document.getElementById('hint-box').classList.remove('hidden');
                showToast('Indice révélé (-5 pts)', 'info');
            } else {
                showToast('Points insuffisants !', 'error');
            }
        }

        function handleAnswer(selectedIndex) {
            if(questionAnswered) return;
            questionAnswered = true;
            document.getElementById('hint-btn').classList.add('hidden'); 

            const q = currentQuizData.questions[currentQuestionIndex];
            const isCorrect = (selectedIndex === q.correct);
            
            if (isCorrect) scoreQuiz.correct++;
            else scoreQuiz.wrong++;

            q.options.forEach((opt, i) => {
                const btn = document.getElementById(`opt-${i}`);
                btn.classList.add('opt-disabled');
                btn.onclick = null; 
                if (i === q.correct) btn.classList.add('opt-correct');
                else if (i === selectedIndex && !isCorrect) btn.classList.add('opt-wrong');
            });

            document.getElementById('next-container').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            renderQuestion();
        }

        function finishQuiz() {
            const totalQ = currentQuizData.questions.length;
            const earnedPts = Math.round(rewardPotential * (scoreQuiz.correct / totalQ));
            const scorePct = Math.round((scoreQuiz.correct / totalQ) * 100);
            
            state.points += earnedPts;
            state.stats.correct += scoreQuiz.correct;
            state.stats.wrong += scoreQuiz.wrong;
            state.completions[currentModuleId] = (state.completions[currentModuleId] || 0) + 1;
            
            state.moduleScores[currentModuleId] = Math.max(state.moduleScores[currentModuleId] || 0, scorePct);

            saveAndRefresh();

            const isGood = scorePct >= 70;
            const mod = modules.find(m => m.id === currentModuleId);

            document.getElementById('quiz-content').innerHTML = `
                <div class="text-center py-8">
                    <h4 class="text-2xl font-bold ${isGood ? 'text-emerald-600' : 'text-orange-500'} mb-2">
                        ${isGood ? 'Bien joué !' : 'À revoir !'}
                    </h4>
                    <p class="text-slate-600 mb-6">Score : ${scorePct}% (${scoreQuiz.correct}/${totalQ})</p>
                    <div class="inline-block bg-emerald-50 text-emerald-700 px-6 py-3 rounded-xl border border-emerald-200 font-bold text-lg mb-8">
                        Gains : + ${earnedPts} pts
                    </div>
                    <div class="flex justify-center gap-3">
                        <button onclick="startModule('${currentModuleId}', '${mod.title.replace(/'/g, "\\'")}', 5)" class="bg-blue-100 hover:bg-blue-200 text-blue-800 font-medium py-2 px-6 rounded-lg transition-colors">Recommencer (+5 pts)</button>
                        <button onclick="closeQuizModal()" class="bg-slate-800 hover:bg-slate-900 text-white font-medium py-2 px-6 rounded-lg transition-colors">Terminer</button>
                    </div>
                </div>
            `;
        }

        function closeQuizModal() { document.getElementById('quiz-modal').classList.add('hidden'); }

        function saveAndRefresh() { localStorage.setItem('tssr_v11', JSON.stringify(state)); initApp(); }
        function saveOnly() { localStorage.setItem('tssr_v11', JSON.stringify(state)); }

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let color = 'bg-blue-600';
            if(type === 'success') color = 'bg-emerald-500';
            if(type === 'error') color = 'bg-red-500';
            
            toast.className = `toast-enter ${color} text-white px-4 py-2 rounded-lg shadow-lg font-medium text-sm`;
            toast.innerHTML = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        function requestReset() { document.getElementById('confirm-modal').classList.remove('hidden'); }
        function closeConfirmModal() { document.getElementById('confirm-modal').classList.add('hidden'); }
        function executeReset() { state = JSON.parse(JSON.stringify(defaultState)); saveAndRefresh(); closeConfirmModal(); }

        initApp();
    </script>
</body>
</html>
